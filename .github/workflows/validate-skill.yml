name: Validate Skill

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Validate core SKILL.md frontmatter
        run: |
          python -c "
          import yaml
          with open('skill/SKILL.md') as f:
              content = f.read()
          # Extract YAML frontmatter between --- delimiters
          parts = content.split('---', 2)
          if len(parts) < 3:
              raise ValueError('SKILL.md missing YAML frontmatter (--- delimiters)')
          meta = yaml.safe_load(parts[1])
          assert 'name' in meta, 'SKILL.md frontmatter missing: name'
          assert 'description' in meta, 'SKILL.md frontmatter missing: description'
          print(f'SKILL.md valid: name={meta[\"name\"]}')
          "

      - name: Validate skill pack YAML files
        run: |
          python -c "
          import yaml
          from pathlib import Path

          required_fields = ['name', 'version', 'description', 'author', 'tags']
          skills_dir = Path('network/skills')

          for pack_dir in sorted(skills_dir.iterdir()):
              if not pack_dir.is_dir():
                  continue
              yaml_path = pack_dir / 'SKILL_PACK.yaml'
              if not yaml_path.exists():
                  print(f'WARNING: {pack_dir.name}/ has no SKILL_PACK.yaml')
                  continue
              with open(yaml_path) as f:
                  content = f.read()
              # Handle YAML frontmatter format
              if content.startswith('---'):
                  parts = content.split('---', 2)
                  meta = yaml.safe_load(parts[1])
              else:
                  meta = yaml.safe_load(content)
              for field in required_fields:
                  assert field in meta, f'{pack_dir.name}/SKILL_PACK.yaml missing: {field}'
              print(f'{pack_dir.name} SKILL_PACK.yaml valid (v{meta[\"version\"]})')
          "

      - name: Run validate_structure.py
        run: |
          python skill/scripts/validate_structure.py --target-dir .

      - name: Lint markdown files
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/*.md
            !node_modules
        continue-on-error: true
